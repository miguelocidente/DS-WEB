<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1 - Alterar Div</title>
    <style>
        /* CSS opcional para dar um tamanho inicial à div e centralizar */
        #conteudo {
            width: 300px;
            height: 150px;
            border: 2px solid black;
            margin-top: 20px;
            padding: 10px;
            font-family: sans-serif;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Exercício: Alterar a Div</h1>

    <!-- O botão que vai chamar nossa função JavaScript -->
    <button onclick="alterarDiv()">Clique para Mudar</button>

    <!-- A div que será alterada. Começa vazia. -->
    <div id="conteudo"></div>

    <!-- Importa o arquivo JavaScript no final do body -->
    <script src="script.js"></script>

</body>
</html>
