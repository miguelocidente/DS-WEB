<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cadastro de Alunos</h1>
        
        <!-- Formulário de Cadastro -->
        <form id="formCadastro">
            <div class="input-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>
            
            <div class="input-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="email@exemplo.com" required>
            </div>
            
            <div class="input-group">
                <label for="rm">RM:</label>
                <input type="number" id="rm" placeholder="Registro de Matrícula" required>
            </div>
            
            <div class="input-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>
            
            <div class="input-group">
                <label for="turma">Turma:</label>
                <input type="text" id="turma" placeholder="Ex: 3º Ano A" required>
            </div>
            
            <button type="button" onclick="cadastrarAluno()">Cadastrar</button>
        </form>

        <hr>

        <h2>Lista de Alunos Cadastrados</h2>
        <!-- onde a lista será exibida -->
        <div id="listaAlunos">
            <!-- Os itens serão adicionados aqui via JavaScript -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
